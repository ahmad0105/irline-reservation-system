version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: airline_db
    environment:
      POSTGRES_USER: airline_user
      POSTGRES_PASSWORD: airline_password
      POSTGRES_DB: airline_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
